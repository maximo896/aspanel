<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AWVS Sqlmap Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b;
            --bg-card: #18181b;
            --bg-card-hover: #27272a;
            --border-subtle: #27272a;
            --border-focus: #3f3f46;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
        }
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        h2 { font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
        h6 { font-weight: 600; letter-spacing: -0.01em; color: #e4e4e7; }
        
        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-subtle); 
            margin-bottom: 24px; 
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .card-header { 
            background: rgba(255,255,255,0.02); 
            border-bottom: 1px solid var(--border-subtle); 
            padding: 16px 20px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .card-body { padding: 20px; }
        
        .form-control, .form-select { 
            background: var(--bg-base); 
            border: 1px solid var(--border-subtle); 
            color: var(--text-main); 
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus { 
            background: var(--bg-base); 
            color: var(--text-main); 
            border-color: var(--accent-blue); 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); 
        }
        .form-control::placeholder { color: #52525b; }
        .form-control:disabled, .form-select:disabled {
            background: var(--bg-base);
            color: #a1a1aa;
            border-color: var(--border-subtle);
            opacity: 1;
            -webkit-text-fill-color: #a1a1aa;
        }
        
        .btn {
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }
        
        .btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .btn-primary:hover { background: var(--accent-blue-hover); border-color: var(--accent-blue-hover); }
        .btn-outline-primary { color: var(--accent-blue); border-color: var(--border-focus); }
        .btn-outline-primary:hover { background: rgba(59, 130, 246, 0.1); border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .btn-outline-success { color: var(--accent-green); border-color: var(--border-focus); }
        .btn-outline-success:hover { background: rgba(16, 185, 129, 0.1); border-color: var(--accent-green); color: var(--accent-green); }

        .btn-outline-danger { color: var(--accent-red); border-color: var(--border-focus); }
        .btn-outline-danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--accent-red); color: var(--accent-red); }

        .btn-outline-secondary { color: var(--text-muted); border-color: var(--border-focus); }
        .btn-outline-secondary:hover { background: var(--bg-card-hover); color: var(--text-main); border-color: var(--text-muted); }
        
        .table { color: var(--text-main); margin-bottom: 0; font-size: 0.9rem; }
        .table th { border-bottom: 1px solid var(--border-subtle); font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; padding: 12px 16px; }
        .table td { border-bottom: 1px solid var(--border-subtle); padding: 12px 16px; vertical-align: middle; }
        .table-hover tbody tr:hover td { background: rgba(255,255,255,0.03); color: var(--text-main); }
        
        .nav-tabs { border-bottom: 1px solid var(--border-subtle); gap: 8px; }
        .nav-tabs .nav-link { color: var(--text-muted); border: none; border-radius: 8px 8px 0 0; padding: 10px 16px; font-weight: 500; transition: all 0.2s; }
        .nav-tabs .nav-link:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
        .nav-tabs .nav-link.active { color: var(--accent-blue); background: var(--bg-card); border-bottom: 2px solid var(--accent-blue); }
        
        .install-box, .code-box, .log-box { 
            background: var(--bg-base); 
            border: 1px solid var(--border-subtle); 
            border-radius: 8px; 
            padding: 16px; 
            font-family: 'JetBrains Mono', 'Fira Code', monospace; 
            font-size: 0.85rem;
            line-height: 1.5;
            color: #d4d4d8;
        }
        .log-box { max-height: 320px; overflow-y: auto; white-space: pre-wrap; }
        
        .summary-box { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border-subtle); 
            border-radius: 10px; 
            padding: 16px; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .summary-title { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 8px; }
        .summary-value { font-size: 1.25rem; font-weight: 600; color: var(--text-main); }
        
        .tree-box { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border-subtle); 
            border-radius: 10px; 
            padding: 20px; 
        }
        
        .selected-row td { background: rgba(59, 130, 246, 0.1) !important; border-left: 2px solid var(--accent-blue); }
        .muted { color: var(--text-muted); }
        
        .badge { font-weight: 600; padding: 5px 8px; border-radius: 6px; font-size: 0.7rem; letter-spacing: 0.02em; }
        .badge-soft { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .badge-data { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-shell { background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); border: 1px solid rgba(139, 92, 246, 0.2); }
        
        .tree-database { background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .tree-table { border-left: 2px solid var(--border-focus); margin-left: 8px; padding-left: 16px; margin-top: 16px; }
        .tree-columns { margin-left: 0; margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
        
        .preview-table { font-size: 0.8rem; background: var(--bg-base); border-radius: 6px; overflow: hidden; border-style: hidden; box-shadow: 0 0 0 1px var(--border-subtle); }
        .preview-table th { background: rgba(255,255,255,0.02); }
        
        .filter-group { display: flex; gap: 8px; align-items: center; }
        .filter-btn { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-muted); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { color: var(--text-main); border-color: var(--text-muted); }
        .filter-btn.active { background: var(--text-main); color: var(--bg-base); border-color: var(--text-main); font-weight: 500; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body>
<div id="app" class="container-fluid py-4 px-xl-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">AWVS <span style="color:var(--accent-blue)">Sqlmap</span> Panel</h2>
        <div class="d-flex align-items-center gap-3">
            <button v-if="isAuthenticated" class="btn btn-sm btn-outline-secondary" @click="logout">{{ t('logout') }}</button>
            <div class="text-muted small">{{ t('tagline') }}</div>
            <select class="form-select form-select-sm w-auto bg-dark border-secondary text-white" v-model="language" @change="persistLanguage">
                <option value="en">{{ t('lang_en') }}</option>
                <option value="zh">{{ t('lang_zh') }}</option>
            </select>
        </div>
    </div>

    <div v-if="!authReady" class="card">
        <div class="card-body text-center muted">{{ t('auth_checking') }}</div>
    </div>

    <div v-else-if="!isAuthenticated" class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">{{ t('login_title') }}</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">{{ t('username') }}</label>
                        <input class="form-control" v-model="loginForm.username" :placeholder="t('username')">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t('password') }}</label>
                        <input class="form-control" type="password" v-model="loginForm.password" :placeholder="t('password')">
                    </div>
                    <button class="btn btn-primary w-100" :disabled="loginSubmitting" @click="login">{{ t('login') }}</button>
                </div>
            </div>
        </div>
    </div>

    <template v-else>
    <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
            <a class="nav-link" :class="{active: activeTab==='tasks'}" href="#" @click.prevent="activeTab='tasks'">{{ t('tab_tasks') }}</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{active: activeTab==='awvs'}" href="#" @click.prevent="activeTab='awvs'">{{ t('tab_awvs') }}</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{active: activeTab==='sqlmap'}" href="#" @click.prevent="activeTab='sqlmap'">{{ t('tab_sqlmap') }}</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{active: activeTab==='proxy'}" href="#" @click.prevent="activeTab='proxy'">{{ t('tab_proxy') }}</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" :class="{active: activeTab==='cloud'}" href="#" @click.prevent="activeTab='cloud'">{{ t('tab_cloud') }}</a>
        </li>
    </ul>

    <div v-show="activeTab==='tasks'">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-header">{{ t('add_targets') }}</div>
                    <div class="card-body d-flex flex-column">
                        <textarea class="form-control flex-grow-1 mb-3" v-model="newUrls" :placeholder="t('targets_placeholder')"></textarea>
                        <button class="btn btn-primary" @click="addTasks">{{ t('submit_targets') }}</button>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-8 mb-4">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>{{ t('task_list') }}</span>
                        <div class="d-flex align-items-center gap-3">
                            <div class="filter-group">
                                <button class="filter-btn" :class="{active: taskFilter === 'all'}" @click="taskFilter = 'all'">{{ t('filter_all') }}</button>
                                <button class="filter-btn" :class="{active: taskFilter === 'has_data'}" @click="taskFilter = 'has_data'">{{ t('filter_has_data') }}</button>
                                <button class="filter-btn" :class="{active: taskFilter === 'has_shell'}" @click="taskFilter = 'has_shell'">{{ t('filter_has_shell') }}</button>
                                <button class="filter-btn" :class="{active: taskFilter === 'has_injection'}" @click="taskFilter = 'has_injection'">{{ t('filter_has_injection') }}</button>
                                <button class="filter-btn" :class="{active: taskFilter === 'has_finding'}" @click="taskFilter = 'has_finding'">{{ t('filter_has_finding') }}</button>
                            </div>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-danger" v-if="selectedTaskIds.length > 0" @click="batchDeleteTasks" :title="t('title_delete_selected')">{{ t('delete_selected') }} ({{ selectedTaskIds.length }})</button>
                                <button class="btn btn-outline-warning" v-if="selectedTaskIds.length > 0" @click="batchRetryTaskPush" :title="t('title_batch_retry_push')">{{ t('batch_retry_push') }} ({{ selectedTaskIds.length }})</button>
                                <button class="btn btn-outline-light" @click="cleanupTasks" :title="t('title_clean_empty')">{{ t('clean_empty_sqli') }}</button>
                                <button class="btn btn-outline-light" @click="cleanupNoVulnTasks" :title="t('title_clean_0_vuln')">{{ t('clean_0_vuln') }}</button>
                            </div>
                            <button class="btn btn-sm btn-outline-light" @click="fetchData">{{ t('refresh') }}</button>
                        </div>
                    </div>
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr>
                                <th style="width: 40px">
                                    <input class="form-check-input" type="checkbox" @change="toggleAllTasks" :checked="selectedTaskIds.length === paginatedTasks.length && paginatedTasks.length > 0">
                                </th>
                                <th>ID</th>
                                <th>{{ t('target') }}</th>
                                <th>AWVS</th>
                                <th>Sqlmap</th>
                                <th>{{ t('results') }}</th>
                                <th>{{ t('action') }}</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr v-for="task in paginatedTasks" :key="task.ID" :class="{ 'selected-row': selectedTaskId === task.ID }">
                                <td>
                                    <input class="form-check-input" type="checkbox" :value="task.ID" v-model="selectedTaskIds">
                                </td>
                                <td>{{ task.ID }}</td>
                                <td><a :href="task.url" target="_blank" style="color:var(--accent-blue); text-decoration:none">{{ task.url }}</a></td>
                                <td>
                                    <span class="badge" :class="getStatusBadgeClass(task.status)">{{ task.status }}</span>
                                    <div class="mt-1" v-if="task.awvs_server_id"><small class="text-muted" style="font-size: 0.7rem">{{ getServerName(task.awvs_server_id) }}</small></div>
                                </td>
                                <td>
                                    <span class="badge" :class="getSqlmapBadgeClass(task.sqlmap_status)">{{ task.sqlmap_status || 'none' }}</span>
                                    <div class="mt-1" v-if="task.sqlmap_agent_id"><small class="text-muted" style="font-size: 0.7rem">{{ getAgentName(task.sqlmap_agent_id) }}</small></div>
                                </td>
                                <td>
                                    <span v-if="task.has_data" class="badge badge-data me-1">{{ t('badge_data') }}</span>
                                    <span v-if="task.has_shell" class="badge badge-shell me-1">{{ t('badge_shell') }}</span>
                                    <span v-if="task.has_injection" class="badge bg-primary">{{ t('badge_injection') }}</span>
                                    <span v-if="!task.has_data && !task.has_shell && !task.has_injection" class="text-muted small">-</span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" @click="selectTask(task)">{{ t('details') }}</button>
                                </td>
                            </tr>
                            <tr v-if="paginatedTasks.length === 0">
                                <td colspan="7" class="text-center muted py-4">{{ t('no_tasks') }}</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination Controls -->
                    <div class="d-flex justify-content-between align-items-center p-3 border-top" style="border-color: var(--border-subtle) !important">
                        <div class="d-flex align-items-center gap-2">
                            <select class="form-select form-select-sm w-auto bg-dark border-secondary text-white" v-model="pageSize" @change="currentPage = 1; selectedTaskIds = []">
                                <option :value="5">5 / {{ t('per_page') }}</option>
                                <option :value="10">10 / {{ t('per_page') }}</option>
                                <option :value="20">20 / {{ t('per_page') }}</option>
                                <option :value="50">50 / {{ t('per_page') }}</option>
                                <option :value="200">200 / {{ t('per_page') }}</option>
                            </select>
                            <span class="text-muted small">{{ t('total') }}: {{ filteredTasks.length }}</span>
                        </div>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary" :disabled="currentPage === 1" @click="currentPage--">{{ t('prev') }}</button>
                            <button class="btn btn-outline-secondary" v-if="currentPage > 3" @click="currentPage = 1">1</button>
                            <button class="btn btn-outline-secondary" v-if="currentPage > 4" disabled>...</button>
                            <button
                                v-for="page in visiblePageNumbers"
                                :key="'task-page-' + page"
                                class="btn"
                                :class="page === currentPage ? 'btn-primary' : 'btn-outline-secondary'"
                                @click="currentPage = page"
                            >{{ page }}</button>
                            <button class="btn btn-outline-secondary" v-if="currentPage < totalPages - 3" disabled>...</button>
                            <button class="btn btn-outline-secondary" v-if="currentPage < totalPages - 2" @click="currentPage = totalPages">{{ totalPages }}</button>
                            <button class="btn btn-outline-secondary" :disabled="currentPage === totalPages || totalPages === 0" @click="currentPage++">{{ t('next') }}</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="card border-primary" style="border-color: var(--border-focus) !important" v-if="selectedTask">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-bold">{{ t('task_detail') }}: #{{ selectedTask.ID }}</span>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary" @click="loadTaskDetail(selectedTask.ID)">{{ t('refresh_detail') }}</button>
                    <button class="btn btn-outline-secondary" @click="clearTaskSelection">{{ t('close') }}</button>
                </div>
            </div>
            <div class="card-body">
                <div class="row g-3 mb-4">
                    <div class="col-md-2"><div class="summary-box"><div class="summary-title">{{ t('summary_awvs_node') }}</div><div class="summary-value text-truncate" style="font-size: 1rem;" :title="getServerName(selectedTask.awvs_server_id)">{{ getServerName(selectedTask.awvs_server_id) }}</div></div></div>
                    <div class="col-md-2"><div class="summary-box"><div class="summary-title">{{ t('summary_awvs_status') }}</div><div class="summary-value">{{ selectedTask.status || '-' }}</div></div></div>
                    <div class="col-md-4"><div class="summary-box"><div class="summary-title">{{ t('summary_target') }}</div><div class="summary-value" style="font-size: 1rem; word-break: break-all;">{{ selectedTask.url || '-' }}</div></div></div>
                    <div class="col-md-2"><div class="summary-box"><div class="summary-title">{{ t('summary_findings') }}</div><div class="summary-value text-primary">{{ taskFindings.length }}</div></div></div>
                    <div class="col-md-2"><div class="summary-box"><div class="summary-title">{{ t('summary_selected_vuln') }}</div><div class="summary-value">{{ selectedFinding ? selectedFinding.vuln_id.substring(0,8)+'...' : '-' }}</div></div></div>
                </div>

                <div class="d-flex justify-content-between align-items-end mb-3">
                    <div class="filter-group">
                        <span class="text-muted small text-uppercase fw-bold me-2" style="letter-spacing: 0.05em">{{ t('sqli_findings') }}</span>
                        <button class="filter-btn" :class="{active: findingFilter === 'all'}" @click="findingFilter = 'all'">{{ t('filter_all') }}</button>
                        <button class="filter-btn" :class="{active: findingFilter === 'has_data'}" @click="findingFilter = 'has_data'">{{ t('filter_has_data') }}</button>
                        <button class="filter-btn" :class="{active: findingFilter === 'has_shell'}" @click="findingFilter = 'has_shell'">{{ t('filter_has_shell') }}</button>
                        <button class="filter-btn" :class="{active: findingFilter === 'has_injection'}" @click="findingFilter = 'has_injection'">{{ t('filter_has_injection') }}</button>
                    </div>
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <select class="form-select form-select-sm w-auto bg-dark border-secondary text-white" v-model.number="retrySqlmapAgentId">
                            <option :value="0">{{ t('retry_target_auto') }}</option>
                            <option v-for="a in agents" :key="'retry-task-agent-' + a.ID" :value="a.ID">{{ a.name }}</option>
                        </select>
                        <button class="btn btn-outline-warning btn-sm" :disabled="taskActionBusy || !selectedTaskId" @click="retryTaskLevelPush">{{ t('force_retry_task_push') }}</button>
                    </div>
                </div>

                <div class="tree-box mb-4 p-0 overflow-hidden">
                    <div v-if="filteredFindings.length === 0" class="muted p-4 text-center">{{ t('no_findings') }}</div>
                    <div v-else class="table-responsive">
                        <table class="table table-hover align-middle mb-0 border-0">
                            <thead>
                            <tr>
                                <th>{{ t('th_vuln_id') }}</th>
                                <th>{{ t('th_url_path') }}</th>
                                <th>{{ t('th_sent') }}</th>
                                <th>{{ t('th_agent') }}</th>
                                <th>{{ t('th_sqlmap_status') }}</th>
                                <th>{{ t('th_sqlmap_techniques') }}</th>
                                <th>{{ t('use_proxy') }}</th>
                                <th>{{ t('results') }}</th>
                                <th>{{ t('action') }}</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr v-for="finding in paginatedFindings" :key="finding.ID" :class="{ 'selected-row': selectedFindingId === finding.ID }">
                                <td class="font-monospace"><small>{{ finding.vuln_id }}</small></td>
                                <td><small class="text-truncate d-inline-block" style="max-width: 150px;" :title="finding.affects_url">{{ finding.affects_url || '-' }}</small></td>
                                <td><span class="badge" :class="finding.sent_to_sqlmap ? 'bg-success' : 'bg-secondary'">{{ finding.sent_to_sqlmap ? t('yes') : t('no') }}</span></td>
                                <td><small class="text-muted text-truncate d-inline-block" style="max-width: 100px;" :title="getAgentName(finding.sqlmap_agent_id)">{{ getAgentName(finding.sqlmap_agent_id) }}</small></td>
                                <td><span class="badge" :class="getSqlmapBadgeClass(finding.sqlmap_status || 'none')">{{ finding.sqlmap_status || 'none' }}</span></td>
                                <td>
                                    <span v-if="getFindingTechniqueList(finding).length === 0" class="text-muted small">-</span>
                                    <span v-for="tech in getFindingTechniqueList(finding)" :key="finding.ID + ':' + tech" class="badge bg-info text-dark me-1">{{ tech }}</span>
                                </td>

                } else if (end === total) {
                    start = Math.max(1, end - 4);
                }
            }
            const pages = [];
            for (let p = start; p <= end; p += 1) {
                pages.push(p);
            }
            return pages;

    methods: {
        t(key) {
            const pack = I18N[this.language] || I18N.en;
            return (pack && pack[key]) || I18N.en[key] || key;
        },
        tf(key, vars) {
            let s = this.t(key);
            Object.keys(vars || {}).forEach(k => {
                s = s.split('{' + k + '}').join(String(vars[k]));
            });
            return s;
        },
        allowedTabs() {
            return ['tasks', 'awvs', 'sqlmap', 'proxy', 'cloud'];
        },
        normalizeTab(tab) {
            const v = String(tab || '').trim().toLowerCase();
            return this.allowedTabs().includes(v) ? v : 'tasks';
        },
        parsePositiveInt(value) {
            const n = Number.parseInt(String(value || '').trim(), 10);
            return Number.isFinite(n) && n > 0 ? n : null;
        },
        initTabFromURL() {
            const state = this.readRouteStateFromURL();
            this.activeTab = state.tab;
            this.pendingRouteTaskId = state.taskId;
            this.pendingRouteFindingId = state.findingId;
        },
        readRouteStateFromURL() {
            try {
                const params = new URLSearchParams(window.location.search || '');
                const taskId = this.parsePositiveInt(params.get('task'));
                let findingId = this.parsePositiveInt(params.get('finding'));
                if (!taskId) findingId = null;
                return {
                    tab: this.normalizeTab(params.get('tab')),
                    taskId: taskId,
                    findingId: findingId
                };
            } catch (_) {
                return {
                    tab: 'tasks',
                    taskId: null,
                    findingId: null
                };
            }
        },
        syncRouteStateToURL() {
            try {
                const normalized = this.normalizeTab(this.activeTab);
                const taskId = this.parsePositiveInt(this.selectedTaskId);
                const findingId = this.parsePositiveInt(this.selectedFindingId);
                const current = this.readRouteStateFromURL();
                if (current.tab === normalized && current.taskId === taskId && current.findingId === (taskId ? findingId : null)) {
                    return;
                }
                const url = new URL(window.location.href);
                if (normalized === 'tasks') {
                    url.searchParams.delete('tab');
                } else {
                    url.searchParams.set('tab', normalized);
                }
                if (taskId) {
                    url.searchParams.set('task', String(taskId));
                } else {
                    url.searchParams.delete('task');
                }
                if (taskId && findingId) {
                    url.searchParams.set('finding', String(findingId));
                } else {
                    url.searchParams.delete('finding');
                }
                window.history.replaceState({}, '', url.pathname + (url.search || '') + (url.hash || ''));
            } catch (_) {
            }
        },
        applyPendingRouteSelection() {
            if (!this.pendingRouteTaskId) return;
            const targetTask = this.tasks.find(item => item.ID === this.pendingRouteTaskId);
            if (!targetTask) {
                this.pendingRouteTaskId = null;
                this.pendingRouteFindingId = null;
                return;
            }
            const taskId = this.pendingRouteTaskId;
            this.pendingRouteTaskId = null;
            this.selectTask(targetTask);
            this.selectedTaskId = taskId;
        },
        handleLocationChange() {
            const state = this.readRouteStateFromURL();
            if (state.tab !== this.activeTab) {
                this.activeTab = state.tab;
            }
            this.pendingRouteTaskId = state.taskId;
            this.pendingRouteFindingId = state.findingId;
            if (!state.taskId) {
                this.clearTaskSelection();
                return;
            }
            if (this.selectedTaskId && this.selectedTaskId === state.taskId) {
                if (state.findingId && this.selectedFindingId !== state.findingId) {
                    const targetFinding = this.taskFindings.find(item => item.ID === state.findingId);
                    if (targetFinding) {
                        this.selectFinding(targetFinding);
                    }
                }
                return;
            }
            this.applyPendingRouteSelection();
        },
        initAuth() {

                this.isAuthenticated = true;
                if (res && res.data && res.data.username) {

        login() {

            }).finally(() => {
                this.loginSubmitting = false;
            });
        },
        logout() {
            axios.post('/api/auth/logout').finally(() => {
                this.handleUnauthorized();
            });
        },
        handleUnauthorized() {
            this.isAuthenticated = false;

            this.agentEdit = {
                name: agent.name || '',
                url: agent.url || '',
                api_key: agent.api_key || '',
                max_concurrency: agent.max_concurrency || 10,
                default_use_proxy: agent.default_use_proxy !== false,
                share_by_domain: agent.share_by_domain !== false
            };
        },
        cancelEditAgent() {
            this.agentEditId = null;
            this.agentEdit = { name: '', url: '', api_key: '', max_concurrency: 10, default_use_proxy: true, share_by_domain: true };
        },
        saveAgent() {
            if (!this.agentEditId) return;
            axios.put('/api/sqlmap/agents/' + this.agentEditId, this.agentEdit).then(res => {
                if (res.data && res.data.error) {
                    this.notifyError(res.data.error);
                }
                this.fetchAgents();
            }).catch(err => {
                this.notifyError(this.extractError(err));
            });
        },
        refreshAgent(id) {
            axios.post('/api/sqlmap/agents/' + id + '/refresh').then(() => this.fetchAgents());
        },
        async updateSqlmapAgent(agent) {
            if (!agent || !agent.ID) return;
            if (!(await this.askConfirm(this.t('confirm_update_sqlmap_agent')))) {
                return;
            }
            axios.post('/api/sqlmap/agents/' + agent.ID + '/update').then(res => {
                const targetVersion = (res.data && res.data.target_version) || this.sqlmapLatestAgentVersion;
                this.notifySuccess((res.data && res.data.message ? res.data.message : 'ok') + ' -> ' + targetVersion);
                this.fetchAgents();
                setTimeout(() => this.fetchAgents(), 8000);
            }).catch(err => {
                this.notifyError(this.extractError(err));
            });
        },
        testAgent(agent) {
            axios.post('/api/sqlmap/agents/test', { url: agent.url, api_key: agent.api_key }).then(res => {
                this.notify(JSON.stringify(res.data.info || {}, null, 2), 'info');
            }).catch(err => {
                this.notifyError(this.extractError(err));
            });
        },
        selectTask(task) {
            this.pendingRouteTaskId = null;
            this.selectedTaskId = task.ID;
            this.selectedTask = task;
            this.resetTreeExpandState();
            this.retrySqlmapAgentId = 0;
            this.findingPage = 1;
            this.selectedFindingId = null;
            this.selectedFinding = null;
            this.taskActionMessage = '';
            this.searchResults = [];
            this.findingFilter = 'all';
            this.loadTaskDetail(task.ID);
        },
        clearTaskSelection() {
            this.pendingRouteTaskId = null;
            this.pendingRouteFindingId = null;
            this.selectedTaskId = null;
            this.selectedTask = null;
            this.resetTreeExpandState();
            this.retrySqlmapAgentId = 0;
            this.findingPage = 1;
            this.requestEditMode = false;
            this.requestDraft = '';
            this.taskDetail = null;
            this.taskFindings = [];
            this.selectedFindingId = null;
            this.selectedFinding = null;
            this.taskDetailError = '';
            this.taskActionMessage = '';
            this.searchQuery = '';
            this.searchResults = [];
        },
        loadTaskDetail(taskId) {
            this.taskDetailError = '';
            this.taskActionMessage = '';
            axios.get('/api/tasks/' + taskId + '/sqlmap').then(res => {
                this.taskFindings = res.data.findings || [];
                if (this.selectedFindingId) {
                    const currentFinding = this.taskFindings.find(item => item.ID === this.selectedFindingId);
                    if (currentFinding) {
                        this.selectedFinding = currentFinding;
                        if (this.findingHasSqlmapBinding(currentFinding)) {
                            this.loadFindingDetail(currentFinding.ID, true);
                        } else {
                            this.taskDetail = null;
                        }
                        return;
                    }
                }
                if (this.pendingRouteFindingId) {
                    const routeFinding = this.taskFindings.find(item => item.ID === this.pendingRouteFindingId);
                    this.pendingRouteFindingId = null;
                    if (routeFinding) {
                        this.selectFinding(routeFinding);
                        return;
                    }
                }
                const firstFinding = this.taskFindings[0];
                if (firstFinding) {
                    this.selectFinding(firstFinding);
                } else {
                    this.selectedFindingId = null;
                    this.selectedFinding = null;
                    this.taskDetail = null;
                }
            }).catch(err => {
                this.taskDetail = null;
                this.taskFindings = [];
                this.selectedFindingId = null;
                this.selectedFinding = null;
                this.taskDetailError = this.extractError(err);
            });
        },
        refreshSelectedTaskSilently() {
            if (!this.selectedTaskId) return;
            axios.get('/api/tasks/' + this.selectedTaskId + '/sqlmap').then(res => {
                this.taskFindings = res.data.findings || [];
                if (this.selectedFindingId) {
                    const currentFinding = this.taskFindings.find(item => item.ID === this.selectedFindingId);
                    if (currentFinding) {
                        this.selectedFinding = currentFinding;
                        if (!this.requestEditMode && this.findingHasSqlmapBinding(currentFinding)) {
                            this.loadFindingDetail(currentFinding.ID, true);
                        } else if (!this.findingHasSqlmapBinding(currentFinding)) {
                            this.taskDetail = null;
                        }
                        return;
                    }
                }
                if (this.pendingRouteFindingId) {
                    const routeFinding = this.taskFindings.find(item => item.ID === this.pendingRouteFindingId);
                    this.pendingRouteFindingId = null;
                    if (routeFinding) {
                        this.selectFinding(routeFinding);
                        return;
                    }
                }
                const firstFinding = this.taskFindings[0];
                if (firstFinding) {
                    this.selectedFindingId = firstFinding.ID;
                    this.selectedFinding = firstFinding;
                    if (!this.requestEditMode && this.findingHasSqlmapBinding(firstFinding)) {
                        this.loadFindingDetail(firstFinding.ID, true);
                    } else if (!this.findingHasSqlmapBinding(firstFinding)) {
                        this.taskDetail = null;
                    }
                    return;
                }
                this.selectedFindingId = null;
                this.selectedFinding = null;
                this.taskDetail = null;
            }).catch(() => {});
        },
        selectFinding(finding) {
            this.selectedFindingId = finding.ID;
            this.selectedFinding = finding;
            if (this.findingHasSqlmapBinding(finding)) {
                this.loadFindingDetail(finding.ID, false);
            } else {
                this.taskDetailError = '';
                this.taskActionMessage = this.t('finding_not_bound_hint');
                this.taskDetail = null;
                this.requestEditMode = false;
                this.requestDraft = '';
            }
        },
        findingHasSqlmapBinding(finding) {
            if (!finding) return false;
            return !!(finding.sqlmap_task_id && finding.sqlmap_agent_id);
        },
        loadFindingDetail(findingId, silent) {
            if (silent && this.requestEditMode) {
                return;
            }
            if (!silent) {
                this.taskDetailError = '';
                this.taskActionMessage = '';
                this.requestEditMode = false;
                this.requestDraft = '';
            }
            axios.get('/api/findings/' + findingId + '/sqlmap').then(res => {
                this.taskDetail = res.data.scan || res.data;
                this.syncActionSelectors();
                if (!this.requestEditMode) {
                    this.requestDraft = (this.taskDetail && this.taskDetail.request_content) ? this.taskDetail.request_content : '';
                }
                if (res.data.finding) {
                    this.selectedFinding = res.data.finding;
                }
            }).catch(err => {
                this.taskDetail = null;
                this.selectedActionDb = '';
                this.selectedActionTable = '';
                if (!silent) {
                    this.taskDetailError = this.extractError(err);
                }
            });
        },
        startEditRequest() {
            if (!this.taskDetail) return;
            this.requestDraft = this.taskDetail.request_content || '';
            this.requestEditMode = true;
        },
        cancelEditRequest() {
            this.requestEditMode = false;
            this.requestDraft = (this.taskDetail && this.taskDetail.request_content) ? this.taskDetail.request_content : '';
        },
        saveRequestContent() {
            if (!this.selectedFindingId) return;
            axios.put('/api/findings/' + this.selectedFindingId + '/sqlmap/request', {
                request_content: this.requestDraft || ''
            }).then(() => {
                this.requestEditMode = false;
                this.loadFindingDetail(this.selectedFindingId, true);
            }).catch(err => {
                this.taskActionMessage = this.extractError(err);
            });
        },
        runTaskAction(action, extraPayload) {
            if (!this.selectedFindingId) {
                this.taskActionMessage = 'Select a pushed SQLi finding first';
                return;
            }
            this.taskActionBusy = true;
            this.taskActionMessage = '';
            const payload = Object.assign({ action: action }, extraPayload || {});
            if (!payload.db && this.selectedActionDb) {
                payload.db = this.selectedActionDb;
            }
            if (!payload.table && this.selectedActionTable) {
                payload.table = this.selectedActionTable;
            }
            if (this.selectedTech) {
                payload.technique = this.selectedTech;
            }
            axios.post('/api/findings/' + this.selectedFindingId + '/sqlmap/action', payload).then(res => {
                this.taskActionMessage = res.data.message + ' (' + action + ')';
                this.fetchData();
                this.loadFindingDetail(this.selectedFindingId, false);
            }).catch(err => {
                this.taskActionMessage = this.extractError(err);
            }).finally(() => {
                this.taskActionBusy = false;
            });
        },
        searchTaskTree() {
            if (!this.selectedFindingId || !this.searchQuery || !this.selectedActionDb) return;
            this.searchBusy = true;
            this.runTaskAction('search_column', {
                db: this.selectedActionDb,
                table: this.selectedActionTable || '',
                column: this.searchQuery
            });
            axios.get('/api/findings/' + this.selectedFindingId + '/sqlmap/search?q=' + encodeURIComponent(this.searchQuery)).then(res => {
                this.searchResults = res.data.results || [];
            }).catch(err => {
                this.taskActionMessage = this.extractError(err);
            }).finally(() => {
                this.searchBusy = false;
            });
        },
        clearSearch() {
            this.searchQuery = '';
            this.searchResults = [];
        },
        retryTaskPush() {
            if (!this.selectedFindingId) return;
            this.taskActionBusy = true;
            this.taskActionMessage = '';
            axios.post('/api/findings/' + this.selectedFindingId + '/sqlmap/retry-push', {
                sqlmap_agent_id: this.retrySqlmapAgentId || 0
            }).then(res => {
                this.taskActionMessage = res.data.message;
                this.fetchData();
                this.refreshSelectedTaskSilently();
                this.loadFindingDetail(this.selectedFindingId, true);
            }).catch(err => {
                this.taskActionMessage = this.extractError(err);
            }).finally(() => {
                this.taskActionBusy = false;
            });
        },
        retryTaskLevelPush() {
            if (!this.selectedTaskId) return;
            this.taskActionBusy = true;
            this.taskActionMessage = '';
            axios.post('/api/tasks/' + this.selectedTaskId + '/sqlmap/retry-push', {
                sqlmap_agent_id: this.retrySqlmapAgentId || 0
            }).then(res => {
                this.taskActionMessage = res.data.message;
                this.fetchData();
                this.refreshSelectedTaskSilently();
            }).catch(err => {
                this.taskActionMessage = this.extractError(err);
            }).finally(() => {
                this.taskActionBusy = false;
            });
        },
        getServerName(id) {
            const server = this.servers.find(item => item.ID === id);
            return server ? (server.name || server.url) : '-';
        },
        getAgentName(id) {
            const agent = this.agents.find(item => item.ID === id);
            return agent ? (agent.name || agent.url) : '-';
        },
        getStatusBadgeClass(status) {
            const mapping = {
                pending: 'bg-secondary',
                scanning: 'bg-primary',
                completed: 'bg-success',
                failed: 'bg-danger',
                aborted: 'bg-warning text-dark'
            };
            return mapping[status] || 'bg-secondary';
        },
        getSqlmapBadgeClass(status) {
            const mapping = {
                none: 'badge-soft',
                queued: 'bg-warning text-dark',
                running: 'bg-primary',
                completed: 'bg-success',
                failed: 'bg-danger',
                terminated: 'badge-soft'
            };
            return mapping[status] || 'badge-soft';
        },
        getTaskDetailValue(obj, path) {
            let current = obj;
            for (let index = 0; index < path.length; index += 1) {
                if (!current || current[path[index]] === undefined || current[path[index]] === null) {
                    return null;
                }
                current = current[path[index]];
            }
            return current;
        },
        getTaskTechniques() {
            return this.getTaskDetailValue(this.taskDetail, ['content', 'techniques']) || [];
        },
        getTreeDatabases() {
            const treeDatabases = this.getTaskDetailValue(this.taskDetail, ['tree', 'databases']);
            if (Array.isArray(treeDatabases) && treeDatabases.length) {
                return treeDatabases;
            }
            return this.buildFallbackTreeDatabases();
        },
        buildFallbackTreeDatabases() {
            const content = this.getTaskDetailValue(this.taskDetail, ['content']) || {};
            const names = [];
            const currentDb = content.current_db;
            if (currentDb) {
                names.push(currentDb);
            }
            if (Array.isArray(content.dbs)) {
                content.dbs.forEach(name => {
                    if (name) {
                        names.push(name);
                    }
                });
            }
            const uniqueNames = Array.from(new Set(names.filter(Boolean)));
            return uniqueNames.map(name => ({
                name: name,
                priority_table: '',
                tables: []
            }));
        },
        getActionDbOptions() {
            return this.getTreeDatabases().map(item => item.name).filter(Boolean);
        },
        getActionTableOptions() {
            const dbs = this.getTreeDatabases();
            if (this.selectedActionDb) {
                const match = dbs.find(item => item.name === this.selectedActionDb);
                if (!match || !Array.isArray(match.tables)) return [];
                return match.tables.map(item => item.name).filter(Boolean);
            }
            const out = [];
            dbs.forEach(db => {
                (db.tables || []).forEach(tbl => {
                    if (tbl && tbl.name) out.push(tbl.name);
                });
            });
            return Array.from(new Set(out));
        },
        syncActionSelectors() {
            const dbOptions = this.getActionDbOptions();
            if (!dbOptions.length) {
                this.selectedActionDb = '';
                this.selectedActionTable = '';
                return;
            }
            if (!this.selectedActionDb || dbOptions.indexOf(this.selectedActionDb) < 0) {
                this.selectedActionDb = dbOptions[0];
            }
            const tableOptions = this.getActionTableOptions();
            if (!tableOptions.length) {
                this.selectedActionTable = '';
                return;
            }
            if (!this.selectedActionTable || tableOptions.indexOf(this.selectedActionTable) < 0) {
                this.selectedActionTable = tableOptions[0];
            }
        },
        getSelectedTableEstimatedCount() {
            const countRaw = this.getTaskDetailValue(this.taskDetail, ['content', 'count']);
            if (!countRaw || typeof countRaw !== 'object') return 0;
            const dbMap = countRaw[this.selectedActionDb];
            if (!dbMap || typeof dbMap !== 'object') return 0;
            const value = Number(dbMap[this.selectedActionTable]);
            return Number.isFinite(value) && value > 0 ? Math.floor(value) : 0;
        },
        buildDumpPayload() {
            const rows = Math.max(1, Number(this.dumpLimitRows) || 20);
            if (this.dumpLimitMode === 'tail') {
                const total = this.getSelectedTableEstimatedCount();
                if (total > rows) {
                    return {
                        db: this.selectedActionDb,
                        table: this.selectedActionTable,
                        limit_start: total - rows + 1,
                        limit_stop: total
                    };
                }
            }
            return {
                db: this.selectedActionDb,
                table: this.selectedActionTable,
                limit_start: 1,
                limit_stop: rows
            };
        },
        resetTreeExpandState() {
            this.treeRootExpanded = false;
            this.expandedDatabases = {};
            this.expandedTables = {};
        },
        toggleTreeRoot() {
            this.treeRootExpanded = !this.treeRootExpanded;
        },
        toggleDatabaseExpand(databaseName) {
            const key = String(databaseName || '').trim();
            if (!key) return;
            const current = !!this.expandedDatabases[key];
            this.$set(this.expandedDatabases, key, !current);
        },
        isDatabaseExpanded(databaseName) {
            const key = String(databaseName || '').trim();
            return !!this.expandedDatabases[key];
        },
        tableExpandKey(databaseName, tableName) {
            return String(databaseName || '').trim() + ':' + String(tableName || '').trim();
        },
        toggleTableExpand(databaseName, tableName) {
            const key = this.tableExpandKey(databaseName, tableName);
            const current = !!this.expandedTables[key];
            this.$set(this.expandedTables, key, !current);
        },
        isTableExpanded(databaseName, tableName) {
            const key = this.tableExpandKey(databaseName, tableName);
            return !!this.expandedTables[key];
        },
        getFindingTechniqueList(finding) {
            const raw = (finding && finding.sqlmap_techniques) ? String(finding.sqlmap_techniques).toUpperCase() : '';
            if (!raw) return [];
            const order = ['B', 'E', 'U', 'S', 'T', 'Q'];
            const seen = {};
            const out = [];
            for (let i = 0; i < order.length; i += 1) {
                const ch = order[i];
                if (raw.indexOf(ch) >= 0 && !seen[ch]) {
                    seen[ch] = true;
                    out.push(ch);
                }
            }
            return out;
        },
        extractError(err) {
            return (err && err.response && err.response.data && err.response.data.error) || (err && err.message) || this.t('request_failed');
        },
        formatTime(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString();
        },
        formatUnixTime(value) {
            if (!value) return '-';
            return new Date(value * 1000).toLocaleString();
        },
        formatRecycleCountdown(value) {
            const expiresAt = Number(value || 0);
            if (!expiresAt) return '-';
            const remain = Math.max(0, expiresAt - this.currentUnixTs);
            const hours = Math.floor(remain / 3600);
            const minutes = Math.floor((remain % 3600) / 60);
            const seconds = remain % 60;
            return hours + '\u5c0f\u65f6' + minutes + '\u5206\u949f' + seconds + '\u79d2';
        },
        formatJson(value) {
            if (value === undefined || value === null || value === '') return '-';
            return typeof value === 'string' ? value : JSON.stringify(value, null, 2);
        },
        formatLogs(logs) {
            if (!logs || !logs.length) return this.t('no_logs');
            return logs.map(item => '[' + (item.time || '-') + '] ' + (item.level || '-') + ' ' + (item.message || '')).join('\n');
        }
    }
});
</script>
