name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux amd64
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/awvs-sqlmap-panel-linux-amd64 .
          chmod +x dist/awvs-sqlmap-panel-linux-amd64
          GOOS=linux GOARCH=amd64 go build -o dist/docker-manager-linux-amd64 ./cmd/docker-manager
          chmod +x dist/docker-manager-linux-amd64
          GOOS=linux GOARCH=arm64 go build -o dist/docker-manager-linux-arm64 ./cmd/docker-manager
          chmod +x dist/docker-manager-linux-arm64
          cd dist
          zip -9 awvs-sqlmap-panel-linux-amd64.zip awvs-sqlmap-panel-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/awvs-sqlmap-panel-linux-amd64
            dist/awvs-sqlmap-panel-linux-amd64.zip
            dist/docker-manager-linux-amd64
            dist/docker-manager-linux-arm64
